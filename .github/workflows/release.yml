name: Create a release
on:
  push:
    tags:
      - "v*TK"

permissions:
  contents: write

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate tag format
        run: |
          TAG=${{ github.ref_name }}
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+TK$ ]]; then
            echo "Invalid tag: $TAG"
            echo "Expected format: v<major>.<minor>.<patch>TK (example: v1.0.0TK)"
            exit 1
          fi
      - name: Patch manifest and zip
        run: |
          TAG=${{ github.ref_name }}
          rm -rf package foxess_modbus.zip
          mkdir -p package/custom_components/foxess_modbus
          cp -a custom_components/foxess_modbus/. package/custom_components/foxess_modbus/
          jq ".version=\"${TAG#v}\"" package/custom_components/foxess_modbus/manifest.json > package/custom_components/foxess_modbus/manifest.json.tmp
          mv package/custom_components/foxess_modbus/manifest.json.tmp package/custom_components/foxess_modbus/manifest.json
          cd package
          zip ../foxess_modbus.zip -r custom_components
      - name: Create or update release
        run: |
          TAG=${{ github.ref_name }}
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" foxess_modbus.zip --clobber
          else
            gh release create "$TAG" foxess_modbus.zip --title "$TAG" --notes "Release $TAG"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
