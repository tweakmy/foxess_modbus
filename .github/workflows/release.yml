name: Create a release
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate tag format
        run: |
          TAG=${{ github.ref_name }}
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+TK$ ]]; then
            echo "Invalid tag: $TAG"
            echo "Expected format: v<major>.<minor>.<patch>TK (example: v1.0.0TK)"
            exit 1
          fi
      - name: Patch manifest and zip
        run: |
          TAG=${{ github.ref_name }}
          VERSION=${TAG#v}
          VERSION=${VERSION%TK}
          cd custom_components/foxess_modbus/
          jq ".version=\"${VERSION}\"" manifest.json > manifest.json.tmp
          mv manifest.json.tmp manifest.json
          zip ../../foxess_modbus.zip -r ./
      - name: Create or update release
        run: |
          TAG=${{ github.ref_name }}
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" foxess_modbus.zip --clobber
          else
            gh release create "$TAG" foxess_modbus.zip --title "$TAG" --notes "Release $TAG"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
